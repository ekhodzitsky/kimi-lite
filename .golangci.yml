version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - prealloc
    - gosec
    - rowserrcheck
    - revive
    - wrapcheck
    - errchkjson
    - bodyclose
    - noctx
  exclusions:
    rules:
      # Test files: common patterns that are acceptable in tests
      - path: '.*_test\.go'
        linters:
          - prealloc
          - errcheck
          - gosec
          - wrapcheck
          - noctx
          - revive
          - ineffassign
          - staticcheck
      # Tool code: gosec false positives for validated file paths
      - path: 'internal/core/tools\.go'
        linters:
          - gosec
      # Turn manager: wrapcheck for known interface returns
      - path: 'internal/core/turn\.go'
        linters:
          - wrapcheck
      # LLM client: errcheck for defers, wrapcheck for context errors
      - path: 'internal/llm/client\.go'
        linters:
          - errcheck
          - wrapcheck
      # Streaming: wrapcheck for stream errors
      - path: 'internal/llm/streaming\.go'
        linters:
          - wrapcheck
      # TUI model: revive for context param position and builtin redefinition
      - path: 'internal/tui/model\.go'
        linters:
          - revive
      # MCP transport test: gosec/errcheck for temp file cleanup
      - path: 'internal/mcp/transport_test\.go'
        linters:
          - gosec
          - errcheck
      # Pre-existing lint issues — to be cleaned up in a dedicated pass
      - path: 'cmd/kimi-lite/main\.go'
        linters:
          - gosec
          - revive
          - wrapcheck
      - path: 'internal/app/app\.go'
        linters:
          - gosec
          - wrapcheck
      - path: 'internal/config/config\.go'
        linters:
          - gosec
      - path: 'internal/config/loader\.go'
        linters:
          - gosec
      - path: 'internal/core/approval\.go'
        linters:
          - revive
      - path: 'internal/core/composite_tools\.go'
        linters:
          - wrapcheck
      - path: 'internal/git/git\.go'
        linters:
          - gosec
          - wrapcheck
      - path: 'internal/llm/fallback\.go'
        linters:
          - wrapcheck
      - path: 'internal/mcp/tool_executor\.go'
        linters:
          - revive
      - path: 'internal/mcp/transport\.go'
        linters:
          - revive
      - path: 'internal/netutil/netutil\.go'
        linters:
          - wrapcheck
      - path: 'internal/store/sqlite\.go'
        linters:
          - errcheck
          - gosec
          - noctx
          - revive
      - path: 'internal/tui/input/input\.go'
        linters:
          - prealloc
      - path: 'internal/tui/messages/messages\.go'
        linters:
          - revive
      - path: 'internal/tui/viewport/viewport\.go'
        linters:
          - prealloc
          - staticcheck
      - path: 'pkg/api/errors\.go'
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ekhodzitsky/kimi-lite
