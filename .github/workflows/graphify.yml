name: Graphify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Graphify
        run: make graphify-install

      - name: Build knowledge graph
        run: make graphify-build

      - name: Upload graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphify-out
          path: graphify-out/
          if-no-files-found: error
