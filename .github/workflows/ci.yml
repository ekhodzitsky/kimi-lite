name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Verify modules
        run: go mod verify

      - name: Check go.mod tidiness
        run: go mod tidy && git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Check for vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build
        run: go build ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Fuzz smoke
        if: matrix.os == 'ubuntu-latest'
        run: |
          go test -run=^$ -fuzz=FuzzReadChunk -fuzztime=10s ./internal/llm
          go test -run=^$ -fuzz=FuzzIsBlockedHost -fuzztime=10s ./internal/netutil
          go test -run=^$ -fuzz=FuzzValidatePath -fuzztime=10s ./internal/core
          go test -run=^$ -fuzz=FuzzHeuristicTokenEstimator -fuzztime=10s ./internal/core
          go test -run=^$ -fuzz=FuzzRiskEvaluator -fuzztime=10s ./internal/core

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run coverage gate
        run: make coverage-gate

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.out

  benchmark-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run benchmark regression
        run: make bench-regression

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: |
            bench.baseline.txt
            bench.new.txt

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Build for Windows
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Verify golangci-lint config
        run: golangci-lint config verify

      - name: golangci-lint
        run: golangci-lint run --timeout=5m
