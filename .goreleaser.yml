version: 2

project_name: kimi-lite

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - id: kimi-lite
    binary: kimi-lite
    main: ./cmd/kimi-lite
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{ .CommitDate }}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: kimi-lite
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: darwin
        formats:
          - zip
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

sboms:
  - id: archive
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
    artifacts: archive

signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
    artifacts: all
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ekhodzitsky
    name: kimi-lite
  draft: false
  prerelease: auto

brews:
  - name: kimi-lite
    repository:
      owner: ekhodzitsky
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/ekhodzitsky/kimi-lite
    description: Lightweight AI coding CLI
    license: MIT
    test: |
      system "#{bin}/kimi-lite", "--version"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
